<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Wingshot Development social preview</title>
  <desc id="desc">A branded social card for Wingshot Development.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9ba0a6" />
      <stop offset="0.52" stop-color="#8e98a4" />
      <stop offset="1" stop-color="#7c8ea5" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Icon box: 200x200, vertically centered at y=215–415, center=(180,315) -->
  <rect x="80" y="215" width="200" height="200" rx="36" fill="#7dd3fc" />

  <!--
    Plane path natural bounds: x≈21–96 (w≈75), y≈17–90 (h≈73).
    Nested SVG with viewBox matching those bounds + equal 8px padding on all sides
    auto-scales and centers the path within the 160x160 inner zone.
  -->
  <svg x="100" y="235" width="160" height="160" viewBox="13 9 91 91">
    <path fill="#0f172a" d="M95.7 17.8a5.2 5.2 0 0 0-5.5-1.1L21.2 44a5.2 5.2 0 0 0 .3 9.6l26.9 9.2 9.2 26.9a5.2 5.2 0 0 0 9.6.4L94.4 22a5.2 5.2 0 0 0-1.6-3.3ZM64.2 61.5l-7.5 19.3-6-17.6a5.2 5.2 0 0 0-3.2-3.2L30 54l54.5-21.1-19.3 7.6a5.2 5.2 0 0 0-3.2 3.1l-3 10 4.7 4.7Z" />
  </svg>

  <!-- Title + tagline: all 3 lines fit within icon height (y=215–415) -->
  <!-- baseline1=272 (18px top pad), baseline2=340 (+68), baseline3=386 (+46) -->
  <text x="322" y="282" fill="#0f172a" font-family="Lexend, Avenir Next, Segoe UI, sans-serif" font-size="56" font-weight="700" letter-spacing="-1">Wingshot</text>
  <text x="322" y="350" fill="#0f172a" font-family="Lexend, Avenir Next, Segoe UI, sans-serif" font-size="56" font-weight="700" letter-spacing="-1">Development</text>

  <!-- Tagline -->
  <text x="325" y="396" fill="#0f172a" font-family="Lexend, Avenir Next, Segoe UI, sans-serif" font-size="28" font-weight="400" opacity="0.72">Software Engineering</text>
</svg>